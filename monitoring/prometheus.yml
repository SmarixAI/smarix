global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: cadvisor
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 5s

  - job_name: backend
    metrics_path: /metrics
    static_configs:
      - targets: ['chatbot_backend:8000']
    scrape_interval: 5s

  - job_name: frontend
    metrics_path: /metrics
    static_configs:
      - targets: ['chatbot_frontend:3000']
    scrape_interval: 30s
