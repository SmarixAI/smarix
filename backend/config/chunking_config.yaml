    - "function"
    - "class"
    - "method"
    - "code"
    - "implementation"
    - "how does"
    - "how is"
    - "where is"
    - "show me the"
    - "find the"
    - "locate"
    - "definition"
    - "functionality"
    - "logic"
    - "algorithm"
    
